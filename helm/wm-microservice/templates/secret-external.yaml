{{/*
Two mutually-exclusive secret backends are supported. ExternalSecret
takes precedence -- if both flags are true, ESO wins (the plain Secret
would race with the operator-reconciled one and lose).

Both render to the same metadata.name so the Deployment's envFrom block
in deployment.yaml works unchanged regardless of which backend is on.
*/}}
{{- if .Values.externalSecrets.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "wm-microservice.secretName" . }}
  labels:
    {{- include "wm-microservice.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "wm-microservice.secretName" . }}
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "wm-microservice.labels" . | nindent 10 }}
  data:
    {{- toYaml .Values.externalSecrets.data | nindent 4 }}
{{- else if .Values.secret.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wm-microservice.secretName" . }}
  labels:
    {{- include "wm-microservice.labels" . | nindent 4 }}
type: Opaque
{{- if .Values.secret.data }}
stringData:
  {{- range $k, $v := .Values.secret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end -}}
