# IS Extended Settings - base layer.
#
# Raw key=value lines as accepted by the IS Administrator "Extended Settings"
# panel. NOT YAML; NOT validated by JSON Schema.
#
# Merge rule: config/<env>/extended-settings.properties (if present) is read
# AFTER this file; later assignments win on key collision.
# See docs/config-merge.md.

# --- Watt server tuning ---
watt.server.threadPool=120
watt.server.threadPoolMin=20
watt.server.transactionTimeoutSecs=600

# --- HTTP listener tuning ---
watt.net.timeout=300
watt.net.maxClientKeepaliveConns=50

# --- Audit logging ---
watt.server.auditLog.policy=Always
watt.server.audit.logRotateSize=100M

# --- Stats ---
watt.server.stats.pollTime=60
watt.server.stats.logFile.enabled=true

# --- Diagnostics ---
watt.server.errorMail=
watt.debug.level=Info
