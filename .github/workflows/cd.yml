# Continuous-deployment promotion pipeline.
#
# Three triggers, one job graph:
#
#   1. push: main          -> auto deploy to dev   (smoke-dev gates)
#   2. workflow_dispatch   -> deploy to target_env (input: dev|test|prod)
#   3. release: published  -> deploy to prod
#
# Job graph:
#
#   select-image
#       |
#       v
#   deploy-dev (env: dev, auto)
#       |
#       v
#   smoke-dev ------(fail)----> rollback-dev
#       |
#       v
#   deploy-test (env: test, manual approval)
#       |
#       v
#   smoke-test -----(fail)----> rollback-test
#       |
#       v
#   deploy-prod (env: prod, manual approval + wait timer + branch=main)
#     | also: pre-deploy DB snapshot via wm-mcp jdbc_pool_export_schema
#       |
#       v
#   smoke-prod -----(fail)----> rollback-prod
#
# Deploy backend dispatch:
#   The deploy job reads config/<env>/deploy.yaml's `target.kind` and
#   shells out to scripts/deploy/docker-ssh.sh OR scripts/deploy/k8s-helm.sh.
#   That keeps the workflow YAML tight; the per-backend logic is unit-
#   testable from the host as plain bash.
#
# Image selection:
#   For push:main + release the image is looked up by github.sha against
#   the CI workflow's tag pattern (main-<sha7>-<full sha>). For
#   workflow_dispatch the user can pass an explicit image_ref input.
#   `select-image` fails if the lookup misses -- e.g. CI hasn't built the
#   image yet, or the pull-request was force-pushed after the merge.
#
# Rollback:
#   Each smoke-<env> job has a sibling rollback-<env> job gated on
#   `if: failure() && needs.smoke-<env>.result == 'failure'`. It calls
#   scripts/deploy/rollback.sh which uses `gh api .../deployments` to
#   find the previous successful image_ref for that env and re-runs
#   the deploy backend with it.
#
# Deployment recording:
#   GitHub auto-creates a deployment when a job uses `environment:`,
#   but the auto-record can't carry custom payload. We additionally
#   POST our own deployment + success status with payload.image_ref
#   after each green deploy; that's what rollback.sh queries.
#
# Acceptance criteria (Task 7.3):
#   * merge to main -> dev deploy + smoke green within 5 min
#   * dispatch test -> requires reviewer, then deploys
#   * deliberate smoke break -> rollback runs + workflow finishes failed

name: cd

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        type: choice
        required: true
        default: dev
        options: [dev, test, prod]
      image_ref:
        description: 'Override image ref (full <repo>:<tag> or @sha256:...). Default: derive from github.sha.'
        required: false
        type: string
        default: ''
  release:
    types: [published]

# Each env gets its own concurrency group so a deploy-dev for SHA A
# does not cancel a deploy-prod for SHA B running in parallel. We use
# the workflow_run id as the differentiator on dispatched runs.
concurrency:
  group: cd-${{ github.event.inputs.target_env || (github.event_name == 'release' && 'prod' || 'dev') }}
  cancel-in-progress: false

# contents: read       - checkout
# packages: read       - pull the service image from GHCR
# deployments: write   - POST .../deployments and statuses for the audit
#                        trail (rollback.sh queries these)
# id-token: write      - reserved for cloud OIDC if a future deploy
#                        backend needs short-lived AWS/Azure creds
permissions:
  contents: read
  packages: read
  deployments: write
  id-token: write
  actions: read

env:
  REGISTRY: ghcr.io
  SERVICE_IMAGE_NAME: ${{ github.repository_owner }}/wm-svc

jobs:
  # ===================================================================
  # select-image
  #
  # Resolve the immutable image_ref we will deploy across every env.
  # Sources, in priority order:
  #   1. workflow_dispatch input `image_ref` (operator override)
  #   2. Tag pattern <MSR_VERSION>-svc-<sha7> -- this is the
  #      "release-quality" tag a publisher would apply
  #   3. CI's PR/main scoped tag main-<sha7>-<full sha> -- works for
  #      push:main runs
  #   4. github.sha + ref via docker buildx imagetools inspect against
  #      well-known tags
  #
  # The job verifies the resolved tag actually exists in the registry;
  # a missing image fails this job (and therefore the whole workflow)
  # before we touch any environment.
  # ===================================================================
  select-image:
    name: select-image
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.resolve.outputs.image_ref }}
      target_env: ${{ steps.target.outputs.target_env }}
      sha: ${{ steps.target.outputs.sha }}
      short_sha: ${{ steps.target.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load pinned tool versions
        run: grep -E '^[A-Z][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"

      - name: Resolve target env + commit
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET: ${{ github.event.inputs.target_env }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # push:main      -> dev
          # release        -> prod
          # workflow_dispatch -> input
          case "${EVENT_NAME}" in
            push)             target=dev ;;
            release)          target=prod ;;
            workflow_dispatch) target="${INPUT_TARGET:-dev}" ;;
            *) echo "::error::unsupported trigger ${EVENT_NAME}"; exit 1 ;;
          esac
          short=${GH_SHA:0:7}
          {
            echo "target_env=${target}"
            echo "sha=${GH_SHA}"
            echo "short_sha=${short}"
          } >> "$GITHUB_OUTPUT"
          echo "Trigger=${EVENT_NAME} target=${target} sha=${GH_SHA} short=${short}"

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Resolve image ref
        id: resolve
        env:
          INPUT_IMAGE_REF: ${{ github.event.inputs.image_ref }}
          SHA: ${{ steps.target.outputs.sha }}
          SHORT: ${{ steps.target.outputs.short_sha }}
          IMAGE_REPO: ${{ env.REGISTRY }}/${{ env.SERVICE_IMAGE_NAME }}
        run: |
          set -euo pipefail

          # Helper: does this <repo>:<tag> exist on the registry?
          exists() {
            docker buildx imagetools inspect "$1" >/dev/null 2>&1
          }

          if [[ -n "${INPUT_IMAGE_REF}" ]]; then
            # Operator override. Validate it's not a mutable tag and
            # that it actually exists.
            case "${INPUT_IMAGE_REF}" in
              *:latest|*-latest|*-latest-*)
                echo "::error::image_ref input must be immutable (no *-latest): ${INPUT_IMAGE_REF}"
                exit 1 ;;
            esac
            if ! exists "${INPUT_IMAGE_REF}"; then
              echo "::error::image_ref does not exist on ${REGISTRY}: ${INPUT_IMAGE_REF}"
              exit 1
            fi
            echo "image_ref=${INPUT_IMAGE_REF}" >> "$GITHUB_OUTPUT"
            echo "Using operator-supplied image_ref: ${INPUT_IMAGE_REF}"
            exit 0
          fi

          # Candidate tags, in order. CI publishes per the patterns in
          # ci.yml setup.tags step:
          #   * pr-<num>-<full sha>     (PR runs, NOT shipped here)
          #   * main-<sha7>-<full sha>  (push to main; what we want)
          # base-image.yml + image-security.yml additionally publish
          # release-quality semver tags for service images:
          #   * <MSR_VERSION>-svc-<sha7>
          # release: published events use the latter.
          candidates=(
            "${IMAGE_REPO}:main-${SHORT}-${SHA}"
            "${IMAGE_REPO}:${MSR_VERSION}-svc-${SHORT}"
          )

          chosen=""
          for c in "${candidates[@]}"; do
            echo "  trying ${c}"
            if exists "${c}"; then
              chosen="${c}"
              break
            fi
          done
          if [[ -z "${chosen}" ]]; then
            echo "::error::no service image found for sha=${SHA}; tried: ${candidates[*]}"
            echo "::error::ensure the CI build (Phase 6) ran successfully for this commit before deploying."
            exit 1
          fi
          echo "image_ref=${chosen}" >> "$GITHUB_OUTPUT"
          echo "Resolved image_ref=${chosen}"

      - name: Job summary
        env:
          IMG: ${{ steps.resolve.outputs.image_ref }}
          TGT: ${{ steps.target.outputs.target_env }}
          SHA: ${{ steps.target.outputs.sha }}
        run: |
          {
            echo "## select-image"
            echo
            echo "- target env : \`${TGT}\`"
            echo "- commit     : \`${SHA}\`"
            echo "- image ref  : \`${IMG}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ===================================================================
  # deploy-dev
  #
  # Auto-runs after every push to main; also reachable via
  # workflow_dispatch with target_env=dev. Uses the GitHub `dev`
  # environment (no required reviewer; protection is just an audit
  # boundary on dev).
  # ===================================================================
  deploy-dev:
    name: deploy-dev
    needs: select-image
    if: needs.select-image.outputs.target_env == 'dev'
    environment:
      name: dev
      url: ${{ vars.DEV_URL }}
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ needs.select-image.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Load pinned tool versions
        run: grep -E '^[A-Z][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"
      - name: Install Python deps
        run: python3 -m pip install --quiet pyyaml

      - name: Deploy
        env:
          ENV: dev
          IMAGE_REF: ${{ needs.select-image.outputs.image_ref }}
          TARGET_HOST: ${{ secrets.TARGET_HOST }}
          TARGET_USER: ${{ secrets.TARGET_USER }}
          TARGET_SSH_KEY: ${{ secrets.TARGET_SSH_KEY }}
          TARGET_KUBECONFIG_B64: ${{ secrets.TARGET_KUBECONFIG_B64 }}
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          SAG_LICENSE_KEY_DEV: ${{ secrets.SAG_LICENSE_KEY_DEV }}
        run: bash scripts/deploy/dispatch.sh

      - name: Record deployment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          IMG: ${{ needs.select-image.outputs.image_ref }}
          SHA: ${{ needs.select-image.outputs.sha }}
        run: bash scripts/deploy/record-deployment.sh dev "${SHA}" "${IMG}"

  # -------------------------------------------------------------------
  # smoke-dev
  # -------------------------------------------------------------------
  smoke-dev:
    name: smoke-dev
    needs: [select-image, deploy-dev]
    if: needs.select-image.outputs.target_env == 'dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run MSR smoke
        env:
          SMOKE_TARGET: ${{ vars.DEV_URL }}
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          SMOKE_REPORT: reports/smoke/junit.xml
        run: bash tests/integration/smoke/run.sh
      - name: Run HelloWorld smoke (env tag assertion)
        env:
          SMOKE_TARGET: ${{ vars.DEV_URL }}
          EXPECTED_ENV_NAME: dev
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          SMOKE_REPORT: reports/smoke/helloworld-junit.xml
        run: bash tests/integration/smoke/HelloWorld.smoke.sh
      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-dev
          path: reports/smoke/**
          if-no-files-found: warn
          retention-days: 14

  # -------------------------------------------------------------------
  # rollback-dev
  #
  # Fires only when smoke-dev failed. Looks up the previous successful
  # image_ref and redeploys it. The workflow as a whole still ends up
  # failed -- rollback restores service but the failed deploy is a
  # release-engineering signal that should NOT be hidden behind a green
  # check-mark.
  # -------------------------------------------------------------------
  rollback-dev:
    name: rollback-dev
    needs: [select-image, deploy-dev, smoke-dev]
    if: always() && needs.deploy-dev.result == 'success' && needs.smoke-dev.result == 'failure'
    environment:
      name: dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load pinned tool versions
        run: grep -E '^[A-Z][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"
      - name: Install Python deps
        run: python3 -m pip install --quiet pyyaml
      - name: Roll back
        env:
          ENV: dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FAILED_IMAGE_REF: ${{ needs.select-image.outputs.image_ref }}
          TARGET_HOST: ${{ secrets.TARGET_HOST }}
          TARGET_USER: ${{ secrets.TARGET_USER }}
          TARGET_SSH_KEY: ${{ secrets.TARGET_SSH_KEY }}
          TARGET_KUBECONFIG_B64: ${{ secrets.TARGET_KUBECONFIG_B64 }}
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          SAG_LICENSE_KEY_DEV: ${{ secrets.SAG_LICENSE_KEY_DEV }}
        run: bash scripts/deploy/rollback.sh --env dev

  # ===================================================================
  # deploy-test
  #
  # Reachable only via workflow_dispatch with target_env=test (an
  # operator hand promotes from dev). The `test` GitHub Environment
  # has a required reviewer attached (configured by
  # scripts/setup-environments.sh in Task 3.3); the workflow blocks
  # at this job until a reviewer approves.
  # ===================================================================
  deploy-test:
    name: deploy-test
    needs: select-image
    if: needs.select-image.outputs.target_env == 'test'
    environment:
      name: test
      url: ${{ vars.TEST_URL }}
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ needs.select-image.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Load pinned tool versions
        run: grep -E '^[A-Z][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"
      - name: Install Python deps
        run: python3 -m pip install --quiet pyyaml
      - name: Deploy
        env:
          ENV: test
          IMAGE_REF: ${{ needs.select-image.outputs.image_ref }}
          TARGET_HOST: ${{ secrets.TARGET_HOST }}
          TARGET_USER: ${{ secrets.TARGET_USER }}
          TARGET_SSH_KEY: ${{ secrets.TARGET_SSH_KEY }}
          TARGET_KUBECONFIG_B64: ${{ secrets.TARGET_KUBECONFIG_B64 }}
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          SAG_LICENSE_KEY_TEST: ${{ secrets.SAG_LICENSE_KEY_TEST }}
        run: bash scripts/deploy/dispatch.sh
      - name: Record deployment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          IMG: ${{ needs.select-image.outputs.image_ref }}
          SHA: ${{ needs.select-image.outputs.sha }}
        run: bash scripts/deploy/record-deployment.sh test "${SHA}" "${IMG}"

  smoke-test:
    name: smoke-test
    needs: [select-image, deploy-test]
    if: needs.select-image.outputs.target_env == 'test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run MSR smoke
        env:
          SMOKE_TARGET: ${{ vars.TEST_URL }}
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          SMOKE_REPORT: reports/smoke/junit.xml
        run: bash tests/integration/smoke/run.sh
      - name: Run HelloWorld smoke (env tag assertion)
        env:
          SMOKE_TARGET: ${{ vars.TEST_URL }}
          EXPECTED_ENV_NAME: test
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          SMOKE_REPORT: reports/smoke/helloworld-junit.xml
        run: bash tests/integration/smoke/HelloWorld.smoke.sh
      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test
          path: reports/smoke/**
          if-no-files-found: warn
          retention-days: 14

  rollback-test:
    name: rollback-test
    needs: [select-image, deploy-test, smoke-test]
    if: always() && needs.deploy-test.result == 'success' && needs.smoke-test.result == 'failure'
    environment:
      name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load pinned tool versions
        run: grep -E '^[A-Z][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"
      - name: Install Python deps
        run: python3 -m pip install --quiet pyyaml
      - name: Roll back
        env:
          ENV: test
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FAILED_IMAGE_REF: ${{ needs.select-image.outputs.image_ref }}
          TARGET_HOST: ${{ secrets.TARGET_HOST }}
          TARGET_USER: ${{ secrets.TARGET_USER }}
          TARGET_SSH_KEY: ${{ secrets.TARGET_SSH_KEY }}
          TARGET_KUBECONFIG_B64: ${{ secrets.TARGET_KUBECONFIG_B64 }}
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          SAG_LICENSE_KEY_TEST: ${{ secrets.SAG_LICENSE_KEY_TEST }}
        run: bash scripts/deploy/rollback.sh --env test

  # ===================================================================
  # deploy-prod
  #
  # Reachable via:
  #   * workflow_dispatch with target_env=prod
  #   * release: published
  #
  # The `prod` GitHub Environment is the most heavily gated:
  #   - required reviewer
  #   - 10 minute wait timer
  #   - branch policy: only main may deploy here
  # All three are configured by scripts/setup-environments.sh (Task 3.3).
  # The workflow YAML doesn't repeat them -- defence-in-depth, but the
  # source of truth for protection is the GH Environment settings.
  #
  # The pre-deploy DB snapshot runs BEFORE the new image rolls out
  # (against the currently-live prod pods) so the artifact captures
  # pre-rollout state for emergency rollback.
  # ===================================================================
  deploy-prod:
    name: deploy-prod
    needs: select-image
    if: needs.select-image.outputs.target_env == 'prod'
    environment:
      name: prod
      url: ${{ vars.PROD_URL }}
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ needs.select-image.outputs.image_ref }}
      snapshot_artifact: db-snapshot-${{ needs.select-image.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Load pinned tool versions
        run: grep -E '^[A-Z][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"

      - name: Install tooling
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml
          # Helm + kubectl for k8s-helm.sh; the prod backend is k8s.
          curl -fsSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" \
            -o /tmp/helm.tgz
          tar -xzf /tmp/helm.tgz -C /tmp linux-amd64/helm
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          sudo curl -fsSL -o /usr/local/bin/kubectl \
            "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          sudo chmod +x /usr/local/bin/kubectl
          helm version --short
          kubectl version --client=true

      # ---- Pre-deploy DB snapshot ----------------------------------
      - name: Pre-deploy DB snapshot
        id: snapshot
        env:
          ENV: prod
          TARGET_KUBECONFIG_B64: ${{ secrets.TARGET_KUBECONFIG_B64 }}
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          SHORT_SHA: ${{ needs.select-image.outputs.short_sha }}
        run: bash scripts/deploy/db-snapshot.sh

      - name: Upload DB snapshot
        if: always() && steps.snapshot.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: db-snapshot-${{ needs.select-image.outputs.short_sha }}
          path: ${{ steps.snapshot.outputs.path }}
          if-no-files-found: error
          retention-days: 90

      - name: Deploy
        env:
          ENV: prod
          IMAGE_REF: ${{ needs.select-image.outputs.image_ref }}
          TARGET_KUBECONFIG_B64: ${{ secrets.TARGET_KUBECONFIG_B64 }}
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          SAG_LICENSE_KEY_PROD: ${{ secrets.SAG_LICENSE_KEY_PROD }}
        run: bash scripts/deploy/dispatch.sh
      - name: Record deployment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          IMG: ${{ needs.select-image.outputs.image_ref }}
          SHA: ${{ needs.select-image.outputs.sha }}
        run: bash scripts/deploy/record-deployment.sh prod "${SHA}" "${IMG}"

  smoke-prod:
    name: smoke-prod
    needs: [select-image, deploy-prod]
    if: needs.select-image.outputs.target_env == 'prod'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run MSR smoke
        env:
          SMOKE_TARGET: ${{ vars.PROD_URL }}
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          SMOKE_REPORT: reports/smoke/junit.xml
        run: bash tests/integration/smoke/run.sh
      - name: Run HelloWorld smoke (env tag assertion)
        env:
          SMOKE_TARGET: ${{ vars.PROD_URL }}
          EXPECTED_ENV_NAME: prod
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          SMOKE_REPORT: reports/smoke/helloworld-junit.xml
        run: bash tests/integration/smoke/HelloWorld.smoke.sh
      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-prod
          path: reports/smoke/**
          if-no-files-found: warn
          retention-days: 14

  rollback-prod:
    name: rollback-prod
    needs: [select-image, deploy-prod, smoke-prod]
    if: always() && needs.deploy-prod.result == 'success' && needs.smoke-prod.result == 'failure'
    environment:
      name: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load pinned tool versions
        run: grep -E '^[A-Z][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"
      - name: Install tooling
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml
          curl -fsSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" \
            -o /tmp/helm.tgz
          tar -xzf /tmp/helm.tgz -C /tmp linux-amd64/helm
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          sudo curl -fsSL -o /usr/local/bin/kubectl \
            "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          sudo chmod +x /usr/local/bin/kubectl
      - name: Roll back
        env:
          ENV: prod
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FAILED_IMAGE_REF: ${{ needs.select-image.outputs.image_ref }}
          TARGET_KUBECONFIG_B64: ${{ secrets.TARGET_KUBECONFIG_B64 }}
          MSR_ADMIN_USER: ${{ secrets.MSR_ADMIN_USER }}
          MSR_ADMIN_PASSWORD: ${{ secrets.MSR_ADMIN_PASSWORD }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          SAG_LICENSE_KEY_PROD: ${{ secrets.SAG_LICENSE_KEY_PROD }}
        run: bash scripts/deploy/rollback.sh --env prod
