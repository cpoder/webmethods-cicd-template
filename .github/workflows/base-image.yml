# Build & publish the corporate webMethods MSR base image.
#
# Builds docker/base/Dockerfile (target=prod -> wm-msr-base), pushes to
# the configured registry with three tags, and attaches a Sigstore
# keyless cosign signature plus a syft-generated SPDX SBOM attestation.
#
# Triggers:
#   - push to docker/base/** or versions.env on main (rebuild on real changes)
#   - weekly schedule (Mon 03:00 UTC) so we pick up upstream UBI/MSR CVE
#     fixes even when nothing in this repo has changed
#   - workflow_dispatch (manual ad-hoc rebuild)
#
# Required secrets:
#   IBMWM_REGISTRY_USER  - IBM webMethods Container Registry token name.
#                          Mint at https://containers.webmethods.io
#                          (sign in with IBMid). Used to pull the MSR
#                          FROM image at the start of the build.
#   IBMWM_REGISTRY_TOKEN - matching token password.
#   REGISTRY_USER        - destination registry username (e.g. github
#                          actor for GHCR, or a corporate service
#                          account). Used to push the built base image.
#   REGISTRY_TOKEN       - destination registry password / PAT with
#                          write:packages scope. For GHCR you can use
#                          ${{ github.token }} instead by overriding the
#                          login step locally.
#
# Verifying the image afterwards:
#   cosign verify \
#     --certificate-identity \
#       "https://github.com/<owner>/<repo>/.github/workflows/base-image.yml@refs/heads/main" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     ghcr.io/<owner>/wm-msr-base:12.1-base-latest

name: base-image

on:
  push:
    branches: [main]
    paths:
      - 'docker/base/**'
      - 'versions.env'
      # Self-rebuild when the workflow itself changes -- catches problems
      # with cosign/syft pinning before they hide for weeks behind a
      # paths filter that only watches docker/.
      - '.github/workflows/base-image.yml'
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

# id-token: write is required for Sigstore Fulcio to mint a keyless
# signing certificate from the workflow's OIDC token.
# packages: write lets us push to GHCR (no-op for non-GHCR registries).
permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wm-msr-base

jobs:
  build:
    name: Build, sign & SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load pinned versions into $GITHUB_ENV
        # versions.env is the single source of truth for MSR_VERSION,
        # WM_MCP_SERVER_VERSION, etc. The $GITHUB_ENV format only
        # accepts KEY=VALUE lines, so filter out comments and blanks.
        run: grep -E '^[A-Z][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ibmwebmethods.azurecr.io (FROM source)
        # The Dockerfile's FROM line pulls IBM's MSR image from the
        # webMethods container registry. Token credentials are minted
        # at https://containers.webmethods.io after IBMid sign-in.
        # Multiple docker/login-action invocations append to the
        # ~/.docker/config.json so both registries are reachable from
        # the subsequent build step.
        uses: docker/login-action@v3
        with:
          registry: ibmwebmethods.azurecr.io
          username: ${{ secrets.IBMWM_REGISTRY_USER }}
          password: ${{ secrets.IBMWM_REGISTRY_TOKEN }}

      - name: Log in to ${{ env.REGISTRY }} (push destination)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          base="${REGISTRY}/${IMAGE_NAME}"
          {
            echo "short_sha=${short_sha}"
            echo "tags<<EOF"
            echo "${base}:${MSR_VERSION}-base"
            echo "${base}:${MSR_VERSION}-base-${short_sha}"
            echo "${base}:${MSR_VERSION}-base-latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push (target=prod)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: docker/base
          file: docker/base/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            MSR_BASE_IMAGE=${{ env.MSR_BASE_IMAGE }}
            MSR_VERSION=${{ env.MSR_VERSION }}
            WM_MCP_SERVER_VERSION=${{ env.WM_MCP_SERVER_VERSION }}
            IMAGE_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=base-image
          cache-to: type=gha,scope=base-image,mode=max
          # Keep the published artifact as a single image manifest.
          # Buildx-baked SLSA provenance produces an OCI image index
          # that some legacy tooling mishandles; we attach signature
          # and SBOM attestations explicitly with cosign below instead.
          provenance: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Sign image with cosign (keyless OIDC)
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          # Sign each tag@digest so `cosign verify <tag>` works for
          # any of the three tags we just pushed.
          for tag in \
              "${REGISTRY}/${IMAGE_NAME}:${MSR_VERSION}-base" \
              "${REGISTRY}/${IMAGE_NAME}:${MSR_VERSION}-base-${short_sha}" \
              "${REGISTRY}/${IMAGE_NAME}:${MSR_VERSION}-base-latest"; do
            cosign sign --yes "${tag}@${IMAGE_DIGEST}"
          done

      - name: Generate SBOM (syft, SPDX-JSON)
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          syft \
            "registry:${REGISTRY}/${IMAGE_NAME}@${IMAGE_DIGEST}" \
            -o spdx-json=sbom.spdx.json

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx-json
          path: sbom.spdx.json
          retention-days: 90

      - name: Attach SBOM as cosign attestation
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${REGISTRY}/${IMAGE_NAME}@${IMAGE_DIGEST}"

      - name: Verify signature & attestation
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # Sanity-check the just-published artifacts. The certificate
          # identity is the workflow ref of THIS job, which is exactly
          # what downstream `cosign verify` consumers will check against.
          expected_identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/base-image.yml@${GITHUB_REF}"
          cosign verify \
            --certificate-identity "${expected_identity}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${REGISTRY}/${IMAGE_NAME}@${IMAGE_DIGEST}"
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity "${expected_identity}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${REGISTRY}/${IMAGE_NAME}@${IMAGE_DIGEST}" > /dev/null

      - name: Job summary
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          {
            echo "## MSR base image published"
            echo
            echo "- Registry: \`${REGISTRY}/${IMAGE_NAME}\`"
            echo "- Digest: \`${IMAGE_DIGEST}\`"
            echo "- Tags:"
            echo "  - \`${MSR_VERSION}-base\`"
            echo "  - \`${MSR_VERSION}-base-${short_sha}\`"
            echo "  - \`${MSR_VERSION}-base-latest\`"
            echo "- Signed (cosign keyless OIDC): yes"
            echo "- SBOM attestation (SPDX-JSON via syft): yes"
          } >> "$GITHUB_STEP_SUMMARY"
