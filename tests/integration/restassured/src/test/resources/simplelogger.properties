# slf4j-simple logging defaults for integration-test runs.
# Bump org.apache.kafka to WARN -- the Kafka client logs reams of
# "Connecting to node X (...)" at INFO that crowd out test output.
org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.log.org.apache.kafka=warn
org.slf4j.simpleLogger.log.org.apache.activemq.audit=warn
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
org.slf4j.simpleLogger.showThreadName=false
