# tests/integration/compose.yml
#
# Integration test stack for webMethods MSR.
#
# Sidecars driven through their *standard* protocols so that the same
# tests pass against any pluggable broker/DB later:
#   - postgres   (Postgres 15 -- target for JDBC round trips)
#   - artemis    (ActiveMQ Artemis -- JMS produce/consume)
#   - mosquitto  (Eclipse Mosquitto -- MQTT)
#   - redpanda   (Kafka API-compatible -- Kafka produce/consume)
#   - msr        (wm-msr-base from Task 1.x; loads packaged services)
#
# Bring up:    docker compose -f tests/integration/compose.yml up -d
# Tear down:   docker compose -f tests/integration/compose.yml down -v
#
# scripts/test-integration.sh handles the full lifecycle: bring up,
# wait until every container is healthy, render the test config
# overlay, apply it via scripts/apply-config.sh, run the test suites,
# then tear down. Container-internal hostnames (postgres, artemis,
# mosquitto, redpanda) are what MSR sees; tests run on the host hit
# the published ports (defaults are deliberately offset to avoid
# colliding with anything the developer may have running locally).

name: wm-integration-tests

networks:
  itests:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: wm_test
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - ./fixtures/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d wm_test || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [itests]

  artemis:
    # apache/activemq-artemis publishes :alpine variants pinned by
    # version. We use the non-persistent default broker; the test
    # tears the volume down after every run.
    image: apache/activemq-artemis:2.31.2-alpine
    environment:
      ARTEMIS_USER: testuser
      ARTEMIS_PASSWORD: testpass
      ANONYMOUS_LOGIN: "false"
    ports:
      - "${ARTEMIS_CORE_HOST_PORT:-61616}:61616"
      - "${ARTEMIS_AMQP_HOST_PORT:-15672}:5672"
      - "${ARTEMIS_CONSOLE_HOST_PORT:-18161}:8161"
    healthcheck:
      # The Jolokia console exposes the broker MBean tree; if it
      # answers 200 OK the broker has finished booting. curl is part
      # of the apache/activemq-artemis base image.
      test:
        - CMD-SHELL
        - >-
          curl -fsS -u testuser:testpass
          'http://localhost:8161/console/jolokia/read/org.apache.activemq.artemis:broker=%22*%22'
          >/dev/null || exit 1
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    networks: [itests]

  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "${MQTT_HOST_PORT:-11883}:1883"
    volumes:
      - ./fixtures/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      # eclipse-mosquitto:2.0 carries busybox; nc is the cheapest
      # signal that the listener is up. mosquitto_pub would also work
      # but adds a publish to the broker on every healthcheck.
      test: ["CMD-SHELL", "nc -z localhost 1883 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [itests]

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.5
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,EXTERNAL://localhost:19092
    ports:
      # 19092 is the *external* listener used by tests running on the
      # docker host. The internal listener at redpanda:9092 is what
      # MSR connects to from inside the network.
      - "${REDPANDA_HOST_PORT:-19092}:19092"
      - "${REDPANDA_ADMIN_HOST_PORT:-19644}:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    networks: [itests]

  msr:
    # Default to the locally-built test image; CI overrides this with
    # the registry-hosted service image (which already has packages
    # baked in).
    image: ${MSR_IMAGE:-wm-msr-base:12.1}
    environment:
      MSR_ADMIN_USER: ${MSR_ADMIN_USER:-Administrator}
      MSR_ADMIN_PASSWORD: ${MSR_ADMIN_PASSWORD:-manage}
    ports:
      - "${MSR_HOST_PORT:-15555}:5555"
    depends_on:
      postgres:  { condition: service_healthy }
      artemis:   { condition: service_healthy }
      mosquitto: { condition: service_healthy }
      redpanda:  { condition: service_healthy }
    healthcheck:
      # MSR's documented liveness endpoint is /invoke/wm.server:ping
      # (also baked into docker/base/Dockerfile's HEALTHCHECK). We
      # repeat the check here so docker compose's --wait flag has a
      # truthful signal on this service too.
      test:
        - CMD-SHELL
        - >-
          curl -fsS -u "${MSR_ADMIN_USER:-Administrator}:${MSR_ADMIN_PASSWORD:-manage}"
          http://localhost:5555/invoke/wm.server:ping >/dev/null || exit 1
      interval: 5s
      timeout: 3s
      retries: 120
      start_period: 90s
    networks: [itests]
