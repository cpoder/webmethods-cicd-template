# tests/integration/fixtures/mosquitto.conf
#
# Minimal Mosquitto config for integration tests:
#   - one anonymous TCP listener on 1883
#   - persistence disabled (the volume is torn down per run anyway)
#
# MQTT auth settings live in config/test/mqtt-connections.yaml on the
# MSR side; the broker accepts anyone here so the test driver doesn't
# have to manage a password file.

listener 1883
allow_anonymous true
persistence false
log_dest stdout
log_type error
log_type warning
log_type notice
