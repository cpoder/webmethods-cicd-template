openapi: 3.0.3
info:
  title: HelloWorld REST API
  version: "2.0.0"
  x-msr-source: HelloWorld.rest:greeter
paths:
  /greet:
    post:
      operationId: greetUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GreetRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GreetResponse"
  # /health intentionally removed -- breaking change
components:
  schemas:
    GreetRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        locale: { type: string }
    GreetResponse:
      type: object
      required: [greeting, locale]
      properties:
        greeting: { type: string }
        locale: { type: string }
        timestamp: { type: string, format: date-time }
