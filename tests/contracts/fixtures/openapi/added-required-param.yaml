openapi: 3.0.3
info:
  title: HelloWorld REST API
  version: "1.2.0"
  x-msr-source: HelloWorld.rest:greeter
paths:
  /greet:
    post:
      operationId: greetUser
      parameters:
        - name: tenant
          in: query
          required: true        # NEW required query parameter -- breaking
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GreetRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GreetResponse"
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
components:
  schemas:
    GreetRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        locale: { type: string }
    GreetResponse:
      type: object
      required: [greeting, locale]
      properties:
        greeting: { type: string }
        locale: { type: string }
        timestamp: { type: string, format: date-time }
    Health:
      type: object
      required: [status]
      properties:
        status: { type: string }
