openapi: 3.0.3
info:
  title: HelloWorld REST API
  version: "1.1.0"
  x-msr-source: HelloWorld.rest:greeter
paths:
  /greet:
    post:
      operationId: greetUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GreetRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GreetResponse"
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
components:
  schemas:
    GreetRequest:
      type: object
      required:
        - name
        - email   # NEW required field -- the headline breaking change
      properties:
        name: { type: string }
        email: { type: string, format: email }
        locale: { type: string }
    GreetResponse:
      type: object
      required:
        - greeting
        - locale
      properties:
        greeting: { type: string }
        locale: { type: string }
        timestamp: { type: string, format: date-time }
    Health:
      type: object
      required:
        - status
      properties:
        status: { type: string }
